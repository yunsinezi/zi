# ══════════════════════════════════════════════════════════
# Netlify 配置文件 - 船舶静力学课程设计系统
# ══════════════════════════════════════════════════════════

# 构建配置
[build]
  # 发布目录（静态文件所在目录）
  publish = "templates"
  
  # 构建命令（如果是纯静态，不需要构建）
  command = "echo 'No build needed'"

# 重定向规则 - 解决 SPA 路由 404 问题
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# 自定义头部
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存配置
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
